<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Scalable landing</title>

    <meta name="theme-color" content="#1A1A1C" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1A1A1C" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="" sizes="any">
    <link rel="manifest" href="site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <style>body {opacity: 1; transition: opacity 0.5s ease;  &.loading { opacity: 0 }}</style>

    <!-- Applying web-components -->
    <script type="module" src="js/app.js"></script>
</head>

<body class="loading">
    <adaptive-header transparent="true" src="/assets/header_footer.json"></adaptive-header>
    <main>
        <slider-hero src="/assets/slider1_content.json"></slider-hero>
        <quotes-block src="/assets/quotes1_content.json"></quotes-block>
        <cards-block src="/assets/cards1_content.json" button-href="404.html" button-text="More" title="News"></cards-block>
        <image-block src="/assets/images1_content.json"></image-block>
        <carousel-block header="Some extra views" src="/assets/carousel1_content.json" halfTime="300" size="8"></carousel-block>
        <form-block src="/assets/form1_content.json"></form-block>
    </main>
    <footer-mini src="/assets/header_footer.json"></footer-mini>
</body>

<script>
    window.addEventListener('load', () => document.body.classList.remove('loading'))
</script>
</html>
