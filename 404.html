<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="theme-color" content="#1A1A1C" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1A1A1C" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">    

    <title>Page not found</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="" sizes="any">
    <link rel="manifest" href="site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <style>body {opacity: 1; transition: opacity 0.5s ease;  &.loading { opacity: 0 }}</style>

    <!-- Applying web-components -->
    <script type="module" src="js/app.js"></script>
</head>

<body class="dark">
    <adaptive-header transpartent="false" src="/assets/header_footer.json"></adaptive-header>
    <div class="not-found">
        <h1>404</h1>
        <h5 class="trans">Page not found</h5>
        <p class="semi-trans">Probably, this part of the website is still under development, and that's a placeholding page</p>
    </div>
</body>

<script>
    window.addEventListener('load', () => document.body.classList.remove('loading'))
</script>
</html>
